services:
  gpp:

    #-----------------------------------------------------------------
    # AMD / Intel iGPU passthrough via DRI
    #-----------------------------------------------------------------
    devices:
      - /dev/dri:/dev/dri
      - /dev/snd:/dev/snd

    group_add:
      - video
      - render

    environment:
      #---------------------------------------------------------------
      # X11 display passthrough
      # Auth handled by xhost via initializeCommand
      #---------------------------------------------------------------
      - DISPLAY=${DISPLAY:-:0}
      #---------------------------------------------------------------
      # Mesa / DRI settings for Raylib on AMD or Intel
      #---------------------------------------------------------------
      - LIBGL_ALWAYS_SOFTWARE=0
      - MESA_GL_VERSION_OVERRIDE=3.3
      #---------------------------------------------------------------
      # PulseAudio passthrough
      #---------------------------------------------------------------
      - PULSE_SERVER=unix:${XDG_RUNTIME_DIR}/pulse/native

    volumes:
      - ./:/gpp
      - ~/.ssh:/host_ssh:ro
      # X11 socket
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # PulseAudio socket
      - ${XDG_RUNTIME_DIR}/pulse:${XDG_RUNTIME_DIR}/pulse:ro