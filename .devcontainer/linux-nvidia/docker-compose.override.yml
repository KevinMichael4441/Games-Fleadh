services:
  gpp:

    #-----------------------------------------------------------------
    # NVIDIA GPU passthrough
    #-----------------------------------------------------------------
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      #---------------------------------------------------------------
      # X11 display passthrough
      # Auth handled by xhost via initializeCommand
      #---------------------------------------------------------------
      - DISPLAY=${DISPLAY:-:0}
      #---------------------------------------------------------------
      # PulseAudio passthrough
      #---------------------------------------------------------------
      - PULSE_SERVER=unix:${XDG_RUNTIME_DIR}/pulse/native

    volumes:
      - ./:/gpp
      - ~/.ssh:/host_ssh:ro
      # X11 socket
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # PulseAudio socket
      - ${XDG_RUNTIME_DIR}/pulse:${XDG_RUNTIME_DIR}/pulse:ro

    devices:
      - /dev/snd:/dev/snd